const POSTS = DATA.posts;
const CHANNELS = DATA.channels;

const COLORS = ["#2AABEE","#E14E54","#9B59B6","#3498DB","#E67E22","#1ABC9C","#E74C3C","#2ECC71","#F39C12","#8E44AD","#16A085","#D35400","#2980B9","#C0392B","#27AE60"];
function chColor(ch) {
  let h = 0;
  for (let i = 0; i < ch.length; i++) h = ch.charCodeAt(i) + ((h << 5) - h);
  return COLORS[Math.abs(h) % COLORS.length];
}

function timeAgo(ds) {
  const d = Math.floor((Date.now() - new Date(ds).getTime()) / 1000);
  if (d < 60) return "сейчас";
  if (d < 3600) return Math.floor(d/60) + "м";
  if (d < 86400) return Math.floor(d/3600) + "ч";
  if (d < 604800) return Math.floor(d/86400) + "д";
  return new Date(ds).toLocaleDateString("ru-RU", {day:"numeric",month:"short"});
}

let state = { period: "week", channel: "all", expanded: {} };
const allChannels = [...new Set(POSTS.map(p => p.channel))];

function filterPosts() {
  const now = Date.now();
  let cutoffs = { "24h": 24*3600e3, today: now - new Date().setHours(0,0,0,0), week: 7*86400e3, month: 30*86400e3, all: Infinity };
  let cutoff = state.period === "today" ? new Date().setHours(0,0,0,0) : now - cutoffs[state.period];
  let posts = state.period === "all" ? POSTS : POSTS.filter(p => new Date(p.date).getTime() >= cutoff);
  if (state.channel !== "all") posts = posts.filter(p => p.channel === state.channel);
  return posts.sort((a, b) => new Date(b.date) - new Date(a.date));
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function render() {
  const posts = filterPosts();
  const periods = [["24h","24ч"],["today","Сегодня"],["week","Неделя"],["month","Месяц"],["all","Все"]];

  let html = `<h1>\u{1f4e1} AI Telegram Digest</h1>
  <div class="subtitle">22–29 марта 2026 · ${Object.keys(CHANNELS).length} каналов</div>
  <div class="filters">${periods.map(([k,l]) => `<button class="${state.period===k?"active":""}" onclick="setPeriod('${k}')">${l}</button>`).join("")}</div>
  <div class="channels"><button class="${state.channel==="all"?"active":""}" style="${state.channel==="all"?"background:#333;color:#fff":""}" onclick="setCh('all')">Все</button>${allChannels.map(ch => `<button class="${state.channel===ch?"active":""}" style="${state.channel===ch?"background:"+chColor(ch)+";color:#fff":""}" onclick="setCh('${ch}')">@${ch}</button>`).join("")}</div>
  <div class="divider"></div>
  <div class="count">${posts.length} постов</div>`;

  if (!posts.length) {
    html += '<div class="empty">Нет постов за выбранный период</div>';
  } else {
    posts.forEach(p => {
      const key = p.channel + "-" + p.id;
      const long = p.text.length > 160;
      const expanded = state.expanded[key];
      const txt = !expanded && long ? esc(p.text.slice(0,160)) + '... <span class="expand" onclick="toggle(\''+key+'\')">ещё</span>' : esc(p.text) + (long ? ' <span class="expand" onclick="toggle(\''+key+'\')">свернуть</span>' : '');
      const url = "https://t.me/" + p.channel + "/" + p.id;
      const col = chColor(p.channel);

      let media = '';
      if (p.mediaUrl) media = `<img src="${esc(p.mediaUrl)}" onerror="this.outerHTML='<div class=img-placeholder>\u{1f5bc}</div>'" alt="">`;

      html += `<div class="post">
        <div class="post-header">
          <span class="avatar" style="background:${col}">${p.channel[0].toUpperCase()}</span>
          <span class="ch-name">@${esc(p.channel)}</span>
          <span class="time">${timeAgo(p.date)}</span>
        </div>
        ${p.fwd_from ? '<div class="fwd">↩ ' + esc(p.fwd_from) + '</div>' : ''}
        <div class="post-body">${media}<div class="post-text">${txt}</div></div>
        <div class="metrics">
          ${p.views ? '👁 '+esc(p.views) : ''}
          ${p.reactions ? '❤️ '+esc(p.reactions) : ''}
          <a class="open-link" href="${url}" target="_blank" rel="noopener">Открыть →</a>
        </div>
      </div>`;
    });
  }
  document.getElementById("app").innerHTML = html;
}

function setPeriod(p) { state.period = p; render(); }
function setCh(c) { state.channel = c; render(); }
function toggle(k) { state.expanded[k] = !state.expanded[k]; render(); }

render();
</script>
