1218","channel":"kdoronin_blog","date":"2026-03-18T20:25:28+00:00","views":"2.17K","reactions":"25","mediaUrl":"https://cdn4.telesco.pe/file/Cn2O6px0OIq4lw2QN3xurk4VFoFg8fZ8SjcxhWxt3yy7TVtLet5nLRFqdHwjmRTO7soJCYi2MglvJwWkYGSUxVMMucR5xJYVxkMG87qfajsFSS7ql3dPK3YOIs1Lr3bDyWo2QF5S2O8Dpz1WaxG8a9wZgGC3S3y5BC00_SIpAFBWrEmSD9Qbytp01ek99QKTwS01dp5H4ft4pDrEYQQ3S-DQkqj0uC8VRY1lbW41jWnQbDUZBpjkY8CbDsHWzDT8XHmDoX53dsyOnpvd-OABiCZeE7bN5x6YlQ86-hc91eROa24tXxOH0yGjWbzMwVVACdK-yjaus8VG0ufXlAJQOQ.jpg","text":"<b>Как покрыть доменную область с помощью Graphiti?<br/></b><br/>У данного фреймворка есть три основных сущности:<br/><br/>1. <b>Episodes:</b> узлы графа, которые пользователь подаёт извне.<br/><br/>2. <b>Entities</b>: порождаемые узлы, создаваемые LLM при добавлении эпизода.<br/><br/>3. <b>Edges:</b> рёбра между узлами.<br/><br/>Также Graphiti позволяет создавать <b>кастомные Entity и Edge</b>. <br/><br/>При этом количество кастомных сущностей может быть не более 10, а <b>кастомных эпизодов в Graphiti не предусмотрено</b>.<br/><br/>Попробуйте найди область знаний, которую можно покрыть десятком кастомных типов сущностей. Это не так-то просто –&nbsp;я пробовал.<br/><br/><b>Как быть?</b><br/>…"},{"id":"230","channel":"nobilix","date":"2026-02-28T18:33:20+00:00","views":"5.88K","reactions":"75","text":"<a href=\"?q=%23ReDigest\">#ReDigest</a><br/><br/><a href=\"https://t.me/nobilix/228\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">Продолжаем</a> субботнюю рубрику, тут я кратко рассказываю про новости из мира технологий и AI, которые привлекли мое внимание.<br/><br/><b>Дайджест недели:</b><br/><br/>- Anthropic <a href=\"https://www.anthropic.com/news/statement-department-of-war\" target=\"_blank\" rel=\"noopener\" onclick=\"return confirm('Open this link?\\n\\n'+this.href);\">отказала</a> Пентагону в использовании Claude для массовой слежки и автономного оружия. Пентагон разорвал контракт, Трамп потребовал отказаться от Claude в function hashColor(s){let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length]}
function timeAgo(ds){const now=Date.now(),d=new Date(ds).getTime(),diff=Math.floor((now-d)/1000);if(diff<60)return"сейчас";if(diff<3600)return Math.floor(diff/60)+"м";if(diff<86400)return Math.floor(diff/3600)+"ч";if(diff<604800)return Math.floor(diff/86400)+"д";return new Date(ds).toLocaleDateString("ru-RU",{day:"numeric",month:"short"})}
function parseViews(v){if(!v)return 0;v=v.trim().replace(/\s/g,"");if(v.endsWith("K"))return parseFloat(v)*1000;if(v.endsWith("M"))return parseFloat(v)*1000000;return parseInt(v)||0}

function filterPosts(){let ps=[...POSTS];if(state.period!=="all"){const now=new Date(),cutoff=new Date();switch(state.period){case"24h":cutoff.setHours(now.getHours()-24);break;case"today":cutoff.setHours(0,0,0,0);break;case"week":cutoff.setDate(now.getDate()-7);break;case"month":cutoff.setMonth(now.getMonth()-1);break}ps=ps.filter(p=>new Date(p.date)>=cutoff)}if(state.channel!=="all")ps=ps.filter(p=>p.channel===state.channel);if(state.search){const q=state.search.toLowerCase();ps=ps.filter(p=>(p.text||"").toLowerCase().includes(q))}if(state.sort==="views")ps.sort((a,b)=>parseViews(b.views)-parseViews(a.views));else if(state.sort==="reactions")ps.sort((a,b)=>(parseInt(b.reactions)||0)-(parseInt(a.reactions)||0));else ps.sort((a,b)=>new Date(b.date)-new Date(a.date));return ps}

function renderFeed(){const ps=filterPosts();if(!ps.length){document.getElementById("feed").innerHTML='<div class="empty">Нет постов за выбранный период</div>';return}const show=ps.slice(0,window._showCount||50);document.getElementById("feed").innerHTML=`<div class="counter">${ps.length} постов</div>`+show.map(p=>{const color=hashColor(p.channel);const chInfo=CHANNELS[p.channel]||{};const url=`https://t.me/${p.channel}/${p.id}`;return`<div class="post-card"><div class="post-header"><div class="ch-avatar" style="background:${color}">${p.channel[0].toUpperCase()}</div><div class="ch-name" title="${chInfo.title||p.channel}">@${p.channel}</div><div class="post-time">${timeAgo(p.date)}</div></div>${p.fwd_from?`<div class="fwd-from">↩ ${p.fwd_from}</div>`:""}${p.mediaUrl?`<div class="post-media"><img src="${p.mediaUrl}" alt="" onerror="this.parentElement.style.display='none'" loading="lazy"></div>`:""}${p.text?`<div class="post-text">${p.text}</div>`:""}${p.views||p.reactions?`<div class="post-footer">${p.views?`<span class="stat">👁 ${p.views}</span>`:""}${p.reactions?`<span class="stat">❤️ ${p.reactions}</span>`:""}${url?`<a href="${url}" target="_blank" class="open-link">открыть →</a>`:""}</div>`:""}${!p.views&&!p.reactions&&url?`<div class="post-footer"><a href="${url}" target="_blank" class="open-link">открыть →</a></div>`:""}</div>`}).join("")+(ps.length>show.length?`<div style="text-align:center;padding:16px"><button class="period-btn" onclick="window._showCount=(window._showCount||50)+50;render()">Загрузить ещё (осталось ${ps.length-show.length})</button></div>`:"")}
