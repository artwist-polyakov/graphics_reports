<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metallik — Дашборд Янв–Март 2024/2025/2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273549;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent24: #94a3b8;
    --accent25: #3b82f6;
    --accent26: #f59e0b;
    --warn: #f97316;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; }

  .header { padding: 24px 32px 16px; border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; }
  .header p { color: var(--muted); margin-top: 4px; font-size: 13px; }

  .legend-global { display: flex; gap: 20px; padding: 12px 32px; border-bottom: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }

  .metric-tabs { display: flex; gap: 4px; padding: 16px 32px 0; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .metric-tab { padding: 8px 16px; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 13px; font-weight: 500;
    background: var(--surface); color: var(--muted); border: 1px solid var(--border); border-bottom: none;
    transition: all .15s; white-space: nowrap; }
  .metric-tab:hover { color: var(--text); background: var(--surface2); }
  .metric-tab.active { background: var(--surface2); color: var(--text); border-color: var(--accent25); }

  .content { padding: 24px 32px; }
  .metric-panel { display: none; }
  .metric-panel.active { display: block; }

  .section-block { margin-bottom: 40px; }
  .section-title { font-size: 15px; font-weight: 600; color: #f1f5f9; margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .notrack-badge { font-size: 11px; background: rgba(249,115,22,0.15); color: var(--warn);
    padding: 2px 8px; border-radius: 4px; font-weight: 400; }

  .chart-wrap { background: var(--surface); border-radius: 10px; padding: 16px; border: 1px solid var(--border); }
  .chart-wrap canvas { max-height: 260px; }

  .summary-table-wrap { margin-top: 16px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--surface2); padding: 8px 12px; text-align: left; color: var(--muted); font-weight: 500;
    border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 8px 12px; border-bottom: 1px solid rgba(51,65,85,0.5); vertical-align: middle; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .val-cell { font-variant-numeric: tabular-nums; font-family: monospace; }
  .yr24 { color: var(--accent24); }
  .yr25 { color: var(--accent25); }
  .yr26 { color: var(--accent26); }
  .delta-pos { color: #4ade80; }
  .delta-neg { color: #f87171; }
  .delta-neu { color: var(--muted); }
  .warn-icon { color: var(--warn); font-size: 12px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

  @media (max-width: 768px) {
    .header, .legend-global, .metric-tabs, .content { padding-left: 16px; padding-right: 16px; }
    .chart-wrap canvas { max-height: 200px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Metallik — Аналитика рекламы и сделок</h1>
  <p>Январь – Март 2024 / 2025 / 2026 &nbsp;·&nbsp; Источник: Яндекс.Директ + Bitrix24 CRM</p>
</div>

<div class="legend-global">
  <div class="legend-item"><div class="legend-dot" style="background:#94a3b8"></div> 2024</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div> 2025</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div> 2026</div>
  <div class="legend-item" style="margin-left:auto; color:#f97316; font-size:12px;">
    ⚠️ 2024 — трекинг по доменам не настроен, показаны общие данные
  </div>
</div>

<div class="metric-tabs">
  <div class="metric-tab active" onclick="switchMetric('spend')">💰 Расходы</div>
  <div class="metric-tab" onclick="switchMetric('deals_all')">📋 Все сделки</div>
  <div class="metric-tab" onclick="switchMetric('deals_cpc')">🖱️ CPC сделки</div>
  <div class="metric-tab" onclick="switchMetric('deals_won')">🏆 Выигранные</div>
  <div class="metric-tab" onclick="switchMetric('deals_won_cpc')">🎯 Выигранные CPC</div>
</div>

<div class="content" id="mainContent">

</div><!-- /content placeholder, filled by JS -->

<script>
const DATA = {"total": {"2024": {"spend": [671284.47, 781260.29, 1074217.58], "deals_all": [444, 584, 678], "deals_cpc": [138, 155, 247], "deals_won": [92, 116, 168], "deals_won_cpc": [23, 32, 64]}, "2025": {"spend": [682646.34, 704750.9099999999, 881075.13], "deals_all": [597, 665, 820], "deals_cpc": [206, 189, 251], "deals_won": [113, 107, 185], "deals_won_cpc": [41, 28, 41]}, "2026": {"spend": [553221.6699999999, 592381.4399999998, 462827.67], "deals_all": [316, 452, 351], "deals_cpc": [70, 98, 87], "deals_won": [45, 71, 27], "deals_won_cpc": [10, 14, 2]}}, "metallik": {"2024": {"spend": [97012.43000000001, 134037.74000000002, 223470.55000000002], "deals_all": [444, 584, 678], "deals_cpc": [138, 155, 247], "deals_won": [92, 116, 168], "deals_won_cpc": [23, 32, 64], "_notrack": true}, "2025": {"spend": [138346.73999999996, 182884.34, 227039.38999999996], "deals_all": [193, 214, 280], "deals_cpc": [32, 32, 47], "deals_won": [40, 37, 59], "deals_won_cpc": [8, 7, 15]}, "2026": {"spend": [167821.3, 240000.0, 224387.33], "deals_all": [148, 175, 163], "deals_cpc": [18, 19, 35], "deals_won": [26, 30, 16], "deals_won_cpc": [4, 5, 0]}}, "landings": {"2024": {"spend": [574272.0399999999, 647222.5499999999, 850747.03], "deals_all": [444, 584, 678], "deals_cpc": [138, 155, 247], "deals_won": [92, 116, 168], "deals_won_cpc": [23, 32, 64], "_notrack": true}, "2025": {"spend": [544299.6000000001, 521866.57000000007, 654035.74], "deals_all": [246, 230, 281], "deals_cpc": [163, 142, 187], "deals_won": [34, 24, 40], "deals_won_cpc": [28, 15, 20]}, "2026": {"spend": [385400.37, 352381.43999999994, 238440.34], "deals_all": [70, 105, 72], "deals_cpc": [45, 63, 47], "deals_won": [8, 10, 4], "deals_won_cpc": [6, 4, 1]}}, "by_domain": {"mir-shtaketnika.ru": {"2024": {"spend": [165929.13, 130426.61, 214600.02], "deals_all": [444, 584, 678], "deals_cpc": [138, 155, 247], "deals_won": [92, 116, 168], "deals_won_cpc": [23, 32, 64], "_notrack": true}, "2025": {"spend": [143051.3, 147000.08000  [138, 155, 247], "deals_won": [92, 116, 168], "deals_won_cpc": [23, 32, 64], "_notrack": true}, "2025": {"spend": [63233.54, 60010.22, 1500.0], "deals_all": [18, 13, 3], "deals_cpc": [11, 11, 1], "deals_won": [3, 0, 1], "deals_won_cpc": [1, 0, 1]}, "2026": {"spend": [0.0, 3000.0, 0.0], "deals_all": [1, 4, 0], "deals_cpc": [1, 3, 0], "deals_won": [0, 1, 0], "deals_won_cpc": [0, 0, 0]}}, "germany-profil.ru": {"2024": {"spend": [104788.82, 100184.45, 99997.75], "deals_all": [444, 584, 678], "deals_cpc": [138, 155, 247], "deals_won": [92, 116, 168], "deals_won_cpc": [23, 32, 64], "_notrack": true}, "2025": {"spend": [49874.75, 80124.63, 80062.62], "deals_all": [28, 24, 32], "deals_cpc": [18, 11, 14], "deals_won": [1, 2, 3], "deals_won_cpc": [0, 1, 0]}, "2026": {"spend": [8277.12, 20002.94, 16019.83], "deals_all": [4, 12, 9], "deals_cpc": [1, 7, 7], "deals_won": [1, 1, 0], "deals_won_cpc": [0, 1, 0]}}, "prodymohod.ru": {"2024": {"spend": [64670.189999999995, 56066.62, 61418.55], "deals_all": [444, 584, 678], "deals_cpc": [138, 155, 247], "deals_won": [92, 116, 168], "deals_won_cpc": [23, 32, 64], "_notrack": true}, "2025": {"spend": [0.0, 0.0, 0.0], "deals_all": [6, 5, 2], "deals_cpc": [0, 0, 1], "deals_won": [0, 0, 0], "deals_won_cpc": [0, 0, 0]}, "2026": {"spend": [4232.84, 7293.73, 2790.14], "deals_all": [0, 7, 1], "deals_cpc": [0, 2, 0], "deals_won": [0, 1, 0], "deals_won_cpc": [0, 0, 0]}}, "prozabor.shop": {"2024": {"spend": [0.0, 0.0, 0.0], "deals_all": [444, 584, 678], "deals_cpc": [138, 155, 247], "deals_won": [92, 116, 168], "deals_won_cpc": [23, 32, 64], "_notrack": true}, "2025": {"spend": [0.0, 0.0, 7376.8], "deals_all": [3, 4, 9], "deals_cpc": [0, 1, 2], "deals_won": [0, 0, 2], "deals_won_cpc": [0, 0, 0]}, "2026": {"spend": [0.0, 0.0, 19384.96], "deals_all": [1, 0, 10], "deals_cpc": [0, 0, 6], "deals_won": [0, 0, 1], "deals_won_cpc": [0, 0, 0]}}}};
const MONTHS = ["Январь", "Февраль", "Март"];
const YEARS = [2024, 2025, 2026];
const COLORS = {"2024": "#94a3b8", "2025": "#3b82f6", "2026": "#f59e0b"};
const COLORS_BG = {"2024": "rgba(148,163,184,0.15)", "2025": "rgba(59,130,246,0.15)", "2026": "rgba(245,158,11,0.15)"};

const METRICS = [
  {key:'spend', label:'Расходы', unit:'₽', money:true},
  {key:'deals_all', label:'Все сделки', unit:'', money:false},
  {key:'deals_cpc', label:'CPC сделки', unit:'', money:false},
  {key:'deals_won', label:'Выигранные', unit:'', money:false},
  {key:'deals_won_cpc', label:'Выигр. CPC', unit:'', money:false},
];

const SECTIONS = [
  {key:'total', label:'Итого по всем', data: DATA.total, notrack2024: false},
  {key:'metallik', label:'metallik.ru', data: DATA.metallik, notrack2024: true},
  {key:'landings', label:'Лендинги (без metallik.ru)', data: DATA.landings, notrack2024: true},
  ...Object.entries(DATA.by_domain).map(([domain, d]) => ({
    key: 'domain_' + domain, label: domain, data: d, notrack2024: true
  }))
];

const chartInstances = {};
let currentMetric = 'spend';

function fmt(val, money) {
  if (money) {
    if (val >= 1000000) return (val/1000000).toFixed(2) + ' млн ₽';
    if (val >= 1000) return Math.round(val/1000) + ' т.р.';
    return Math.round(val) + ' ₽';
  }
  return val.toString();
}

function delta(a, b) {
  if (!a || a === 0) return null;
  return ((b - a) / a * 100).toFixed(1);
}

function deltaHtml(pct) {
  if (pct === null) return '<span class="delta-neu">—</span>';
  const n = parseFloat(pct);
  if (n > 0) return `<span class="delta-pos">+${pct}%</span>`;
  if (n < 0) return `<span class="delta-neg">${pct}%</span>`;
  return `<span class="delta-neu">0%</span>`;
}

function buildSection(sec, metricKey, money, containerId) {
  const wrap = document.getElementById(containerId);
  if (!wrap) return;

  // Chart
  const chartId = `chart_${sec.key}_${metricKey}`;
  const datasets = YEARS.map(yr => {
    const yrStr = String(yr);
    const yrData = sec.data[yrStr] || {};
    const vals = yrData[metricKey] || [0,0,0];
    const notrack = yrData._notrack || false;
    return {
      label: String(yr) + (notrack && metricKey !== 'spend' ? ' ⚠️' : ''),
      data: vals,
      borderColor: COLORS[yrStr],
      backgroundColor: COLORS_BG[yrStr],
      borderWidth: 2.5,
      pointRadius: 5,
      pointHoverRadius: 7,
      tension: 0.3,
      fill: false,
    };
  });

  const canvas = document.getElementById(chartId);
  if (!canvas) return;
  if (chartInstances[chartId]) chartInstances[chartId].destroy();

  chartInstances[chartId] = new Chart(canvas, {
    type: 'line',
    data: { labels: MONTHS, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: {
          position: 'top',
          labels: { color: '#94a3b8', font: {size: 12}, boxWidth: 12, padding: 16 }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.parsed.y, money)}`,
          },
          backgroundColor: 'rgba(15,23,42,0.95)',
          borderColor: '#334155',
          borderWidth: 1,
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
          padding: 10,
        }
      },
      scales: {
        x: { grid: { color: 'rgba(51,65,85,0.5)' }, ticks: { color: '#94a3b8' } },
        y: {
          grid: { color: 'rgba(51,65,85,0.5)' },
          ticks: { color: '#94a3b8', callback: v => fmt(v, money) },
          beginAtZero: true,
        }
      }
    }
  });

  // Table
  const tableId = `table_${sec.key}_${metricKey}`;
  const table = document.getElementById(tableId);
  if (!table) return;

  const notrack24 = (sec.data['2024'] || {})._notrack || false;
  let html = `<thead><tr>
    <th>Месяц</th>
    <th class="yr24">2024${notrack24 && metricKey!=='spend' ? ' ⚠️':''}</th>
    <th class="yr25">2025</th>
    <th class="yr26">2026</th>
    <th>25 vs 24</th>
    <th>26 vs 25</th>
  </tr></thead><tbody>`;

  MONTHS.forEach((m, i) => {
    const v24 = ((sec.data['2024'] || {})[metricKey] || [0,0,0])[i];
    const v25 = ((sec.data['2025'] || {})[metricKey] || [0,0,0])[i];
    const v26 = ((sec.data['2026'] || {})[metricKey] || [0,0,0])[i];
    html += `<tr>
      <td>${m}</td>
      <td class="val-cell yr24">${fmt(v24, money)}</td>
      <td class="val-cell yr25">${fmt(v25, money)}</td>
      <td class="val-cell yr26">${fmt(v26, money)}</td>
      <td>${notrack24 && metricKey!=='spend' ? '<span class="warn-icon">⚠️</span>' : deltaHtml(delta(v24,v25))}</td>
      <td>${deltaHtml(delta(v25,v26))}</td>
    </tr>`;
  });

  // Totals row
  const t24 = ((sec.data['2024'] || {})[metricKey] || [0,0,0]).reduce((a,b)=>a+b,0);
  const t25 = ((sec.data['2025'] || {})[metricKey] || [0,0,0]).reduce((a,b)=>a+b,0);
  const t26 = ((sec.data['2026'] || {})[metricKey] || [0,0,0]).reduce((a,b)=>a+b,0);
  html += `<tr style="font-weight:600; border-top: 2px solid #334155;">
    <td>Итого</td>
    <td class="val-cell yr24">${fmt(t24, money)}</td>
    <td class="val-cell yr25">${fmt(t25, money)}</td>
    <td class="val-cell yr26">${fmt(t26, money)}</td>
    <td>${notrack24 && metricKey!=='spend' ? '<span class="warn-icon">⚠️</span>' : deltaHtml(delta(t24,t25))}</td>
    <td>${deltaHtml(delta(t25,t26))}</td>
  </tr>`;

  html += '</tbody>';
  table.innerHTML = html;
}

function buildMetricPanel(metricKey) {
  const meta = METRICS.find(m => m.key === metricKey);
  const money = meta.money;

  const panel = document.getElementById(`panel_${metricKey}`);
  if (!panel) return;

  SECTIONS.forEach(sec => {
    buildSection(sec, metricKey, money, `sec_${sec.key}_${metricKey}`);
  });
}

function switchMetric(metricKey) {
  // Update tabs
  document.querySelectorAll('.metric-tab').forEach((t, i) => {
    t.classList.toggle('active', METRICS[i].key === metricKey);
  });

  // Update panels
  document.querySelectorAll('.metric-panel').forEach(p => {
    p.classList.toggle('active', p.id === `panel_${metricKey}`);
  });

  currentMetric = metricKey;
  buildMetricPanel(metricKey);
}

// Build DOM structure
function buildDOM() {
  const content = document.getElementById('mainContent');
  content.innerHTML = '';

  METRICS.forEach(metric => {
    const panel = document.createElement('div');
    panel.className = 'metric-panel' + (metric.key === 'spend' ? ' active' : '');
    panel.id = `panel_${metric.key}`;

    SECTIONS.forEach(sec => {
      const notrack24 = (sec.data['2024'] || {})._notrack || false;
      const showWarn = notrack24 && metric.key !== 'spend';

      panel.innerHTML += `
        <div class="section-block" id="sec_${sec.key}_${metric.key}">
          <div class="section-title">
            ${sec.label}
            ${showWarn ? '<span class="notrack-badge">⚠️ 2024 без трекинга</span>' : ''}
          </div>
          <div class="chart-wrap">
            <canvas id="chart_${sec.key}_${metric.key}"></canvas>
          </div>
          <div class="summary-table-wrap">
            <table id="table_${sec.key}_${metric.key}"></table>
          </div>
          <hr class="divider">
        </div>
      `;
    });

    content.appendChild(panel);
  });

  // Build initial panel
  buildMetricPanel('spend');
}

document.addEventListener('DOMContentLoaded', buildDOM);
</script>

</body>
</html>
